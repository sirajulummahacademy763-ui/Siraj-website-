<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Sirajul Ummatul Islamiyah</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="container">

<div class="logo">

<h1>سراج الأمة الإسلامية</h1>

<p>Sirajul Ummatul Islamiyah</p>

</div>

</div>

</header>

<section class="login-page">

<div class="login-box">
  

<h2>Welcome Back</h2>

<p>Sign in to continue your Islamic learning journey.</p>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
placeholder="Enter your password"
required>

</div>

<div class="remember">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

Login

</button>

</form>

<div class="register-link">

Don't have an account?

<a href="register.html">

Create Account

</a>

</div>

</div>


    
</section>

<script type="module" src="auth.js">

  const loginForm = document.getElementById('login-form');

if (loginForm) {
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      alert(`Login failed: ${error.message}`);
    } else {
      alert('Logged in successfully!');
      window.location.href = 'Dashboard.html'; // Sends user to dashboard page
    }
  });
}
</script>

</body>
</html>
