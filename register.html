<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Sirajul Ummatul Islamiyah</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="container">

<div class="logo">

<h1>سراج الأمة الإسلامية</h1>

<p>Sirajul Ummatul Islamiyah</p>

</div>

</div>

</header>

<section class="register-page">

<div class="register-box">

<h2>Create Your Account</h2>

<p>Join thousands of students learning authentic Islam.</p>

<form id="registerForm">

<div class="input-group">

<label>Full Name</label>

<input type="text" placeholder="Enter your full name" required>

</div>

<div class="input-group">

<label>Email Address</label>

<input type="email" placeholder="Enter your email" required>

</div>

<div class="input-group">

<label>Phone Number</label>

<input type="tel" placeholder="Enter your phone number" required>

</div>

<div class="input-group">

<label>Create Password</label>

<input type="password" placeholder="Create a password" required>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input type="password" placeholder="Confirm your password" required>

</div>

<div class="input-group">

<label>Country</label>

<input type="text" placeholder="Your country">

</div>

<div class="input-group">

<label>Profile Picture</label>

<input type="file" accept="image/*">

</div>

<label>

<input type="checkbox" required>

I agree to the Terms and Conditions.

</label>

<button type="submit">

Create Account

</button>

</form>

<p class="register-link">

Already have an account?

<a href="login.html">Login</a>

</p>

</div>

</section>

<script src="assets/js/app.js"></script>

</body>

</html>
